<svg xmlns="http://www.w3.org/2000/svg" width="680" height="214" viewBox="0 0 680 214" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Ingestion routing by source type">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="270" y="40" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Source type?</text>

  <line x1="340" y1="84" x2="113" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="84" x2="262" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="84" x2="418" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="84" x2="567" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="120" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="107" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">ERP / SQL</text>
    <text x="107" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Mirroring</text>
  </g>
  <g>
    <rect x="195" y="120" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="262" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Files / SFTP</text>
    <text x="262" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Copy job</text>
  </g>
  <g>
    <rect x="350" y="120" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="417" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">API / IoT</text>
    <text x="417" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Notebook</text>
  </g>
  <g>
    <rect x="505" y="120" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="572" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Self-service</text>
    <text x="572" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Dataflow Gen2</text>
  </g>

  <text x="340" y="200" text-anchor="middle" font-size="12" fill="#5F5E5A">Frequency is set per source in the inventory — shared sources move off the single daily batch.</text>
</svg>
