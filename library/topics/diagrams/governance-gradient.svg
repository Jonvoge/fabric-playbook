<svg xmlns="http://www.w3.org/2000/svg" width="680" height="172" viewBox="0 0 680 172" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Governance class strictness gradient">
  <defs>
    <marker id="arrowL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" text-anchor="middle" font-size="12" fill="#5F5E5A">Control, CI/CD and certification rise toward Central</text>
  <line x1="620" y1="40" x2="60" y2="40" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrowL)"/>

  <g>
    <rect x="40" y="62" width="190" height="74" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="135" y="88" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">Central</text>
    <text x="135" y="108" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">full CI/CD · restricted items</text>
    <text x="135" y="124" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">platform-owned · certified</text>
  </g>
  <g>
    <rect x="245" y="62" width="190" height="74" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="88" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">Governed</text>
    <text x="340" y="108" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">managed self-service</text>
    <text x="340" y="124" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">shared guardrails</text>
  </g>
  <g>
    <rect x="450" y="62" width="190" height="74" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="545" y="88" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">Self-service</text>
    <text x="545" y="108" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">business-owned</text>
    <text x="545" y="124" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">relaxed, fenced</text>
  </g>
</svg>
