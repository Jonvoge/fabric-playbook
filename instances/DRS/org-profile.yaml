notes: >
  DRS operates Denmark's deposit-return scheme. A prior Inspari Fabric Playbook established a solid,
  well-documented back-end: medallion warehouse + lakehouse shortcuts, the FETA metadata-driven
  transformation accelerator, F64/F16 capacity split, deployment pipelines, and Entra-group RBAC.
  Operating model is central-platform (A1): one small central team builds; business domains consume
  with light super-user self-service (A2 flavour on the Data Products side) — the wiki's "Data Mesh"
  language is aspirational, not operational. This 2-week sprint is FRONT-END ONLY: making and
  persisting decisions on the semantic layer, Power BI app/report structure, RLS/OLS, writeback, and
  front-end git/CI-CD. Back-end decisions are already made and are not being re-litigated.
